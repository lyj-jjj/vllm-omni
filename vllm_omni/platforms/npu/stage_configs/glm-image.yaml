# Stage config for running GLM-Image with Sequence Parallelism on Diffusion
#
stage_args:
  # Stage 0: AR Model (GlmImageForConditionalGeneration) with TP
  - stage_id: 0
    stage_type: llm
    runtime:
      process: true
      devices: "0,1,2,3"
      env:
        HCCL_IF_BASE_PORT: 23000
        HCCL_HOST_SOCKET_PORT_RANGE: "23000-23199"
        HCCL_NPU_SOCKET_PORT_RANGE: "23200-23399"
        HCCL_SOCKET_IFNAME: enp189s0f0
      requires_multimodal_data: true
    engine_args:
      model_stage: ar
      max_num_seqs: 1
      model_arch: GlmImageForConditionalGeneration
      model_subdir: vision_language_encoder
      tokenizer_subdir: processor
      worker_cls: vllm_omni.platforms.npu.worker.npu_ar_worker.NPUARWorker
      scheduler_cls: vllm_omni.core.sched.omni_ar_scheduler.OmniARScheduler
      gpu_memory_utilization: 0.6
      async_scheduling: false
      enforce_eager: false
      trust_remote_code: true
      compilation_config:
        cudagraph_capture_sizes: [1,2]
        cudagraph_mode: "FULL_DECODE_ONLY"
      engine_output_type: token_ids
      distributed_executor_backend: "mp"
      enable_prefix_caching: true
      max_num_batched_tokens: 32768
      tensor_parallel_size: 4
      sequence_parallel_size: 1
    final_output: false
    is_comprehension: true
    default_sampling_params:
      temperature: 0.8
      top_p: 0.8
      top_k: 16512
      max_tokens: 3601 # Large enough for 1920x1024 (needs 2401) and some margin
      stop_token_ids: [16385]
      seed: 42
      detokenize: false

  # Stage 1: Diffusion (DiT + VAE) with SP
  - stage_id: 1
    stage_type: diffusion
    runtime:
      process: true
      devices: "0,1,2,3"
      env:
        HCCL_IF_BASE_PORT: 24000
        HCCL_HOST_SOCKET_PORT_RANGE: "24000-24199"
        HCCL_NPU_SOCKET_PORT_RANGE: "24200-24399"
        HCCL_SOCKET_IFNAME: enp189s0f0
      requires_multimodal_data: true
    engine_args:
      model_stage: dit
      max_num_seqs: 1
      model_arch: GlmImagePipeline
      enforce_eager: true
      trust_remote_code: true
      distributed_executor_backend: "mp"
      parallel_config:
        tensor_parallel_size: 1  # Diffusion 使用 SP 而不是 TP
        sequence_parallel_size: 4  # SP=4 (Ulysses)
        ulysses_degree: 4  # Ulysses 度为 4
        ring_degree: 1  # Ring 度为 1
    engine_input_source: [0]
    custom_process_input_func: vllm_omni.model_executor.stage_input_processors.glm_image.ar2diffusion
    final_output: true
    final_output_type: image
    default_sampling_params:
      seed: 42
      num_inference_steps: 50
      guidance_scale: 1.2
      height: 1024
      width: 1024

runtime:
  enabled: true
  defaults:
    window_size: -1
    max_inflight: 1

  edges:
    - from: 0
      to: 1
      window_size: -1